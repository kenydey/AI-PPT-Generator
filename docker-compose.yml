version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./backend/templates:/app/backend/templates
    # env_file: .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "6000:6000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
